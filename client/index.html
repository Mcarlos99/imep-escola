<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>IMEP - Instituto Magalhães de Educação Profissional</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <script>
      // Suppress React 19 + Radix UI DOM manipulation errors
      // This is a known compatibility issue that doesn't affect functionality
      window.addEventListener('error', function(event) {
        if (event.message && (
          event.message.includes('removeChild') ||
          event.message.includes('NotFoundError') ||
          event.message.includes('not a child of this node')
        )) {
          event.preventDefault();
          console.warn('DOM error suppressed:', event.message);
          return true;
        }
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
